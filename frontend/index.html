<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Roadmap Platform</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            text-align: center;
        }
        h1 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .btn {
            display: inline-block;
            background-color: #3b82f6;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #2563eb;
        }
        .links-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .secondary-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
        }
        .secondary-link:hover {
            color: #cbd5e1;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Career Roadmap Previews</h1>
        <a href="/login_integrated_journey/code.html" class="btn">Launch Platform (Login)</a>
        
        <div class="links-container">
            <a href="/onboarding_goal_selection/code.html" class="secondary-link">Onboarding Goal Selection</a>

</html>
